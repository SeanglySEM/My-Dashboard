<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@200;300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Video Background -->
    <video class="bg-video" id="bg-video" muted loop playsinline></video>
    <!-- Image Background -->
    <div class="bg-layer" id="bg-layer"></div>

    <!-- Top Buttons -->
    <button class="icon-btn top-btn theme-toggle" id="theme-toggle" title="Toggle theme">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
    </button>
    <button class="icon-btn top-btn settings-toggle" id="settings-toggle" title="Settings">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
    </button>

    <div class="dashboard">
        <!-- Greeting -->
        <div class="greeting" id="greeting">
            <span class="greeting-icon" id="greeting-icon"></span>
            <span id="greeting-text">Good morning</span>
        </div>

        <!-- Clock Widget -->
        <div class="widget clock-widget">
            <div class="time" id="time">00:00:00</div>
            <div class="date" id="date">Loading...</div>
        </div>

        <!-- Search Bar -->
        <div class="widget search-widget">
            <form class="search-form" id="search-form">
                <div class="search-wrapper">
                    <svg class="search-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
                    <input type="text" class="search-input" id="search-input" placeholder="Search with Brave..." autocomplete="off" />
                </div>
            </form>
        </div>

        <!-- Quote Widget -->
        <div class="widget quote-widget">
            <svg class="quote-mark" width="24" height="24" viewBox="0 0 24 24" fill="currentColor" opacity="0.3"><path d="M10 11h-4v4h4v-4zM18 11h-4v4h4v-4z"/></svg>
            <p class="quote-text" id="quote-text">Loading...</p>
            <p class="quote-author" id="quote-author"></p>
        </div>

        <!-- Weather Widget -->
        <div class="widget weather-widget">
            <div class="widget-header">
                <h2>
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 10h-1.26A8 8 0 1 0 9 20h9a5 5 0 0 0 0-10z"/></svg>
                    Weather
                </h2>
            </div>
            <div class="weather-content" id="weather-content">
                <p class="weather-placeholder">Loading weather...</p>
            </div>
            <div class="saved-cities" id="saved-cities" style="display: none;"></div>
        </div>

        <!-- Settings Widget (moved to sidebar by JS) -->
        <div class="widget settings-widget" id="settings-widget">
            <div class="widget-header">
                <h2>
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
                    Settings
                </h2>
            </div>
            <div class="settings-row">
                <label for="name-input">Your Name</label>
                <div class="settings-input-row">
                    <input type="text" class="settings-input" id="name-input" placeholder="Enter your name..." />
                    <button class="save-btn" id="save-name-btn">Save</button>
                </div>
            </div>
            <div class="settings-row">
                <label>Accent Color</label>
                <div class="color-options" id="color-options">
                    <button class="color-dot active" data-color="blue" style="background:#4b4bff" title="Blue"></button>
                    <button class="color-dot" data-color="purple" style="background:#9b59b6" title="Purple"></button>
                    <button class="color-dot" data-color="green" style="background:#2ecc71" title="Green"></button>
                    <button class="color-dot" data-color="orange" style="background:#f39c12" title="Orange"></button>
                    <button class="color-dot" data-color="red" style="background:#e74c3c" title="Red"></button>
                </div>
            </div>
            <div class="settings-row">
                <label>Background Type</label>
                <div class="bg-type-row">
                    <button class="save-btn bg-type-btn active" data-bg-type="image">Image</button>
                    <button class="save-btn bg-type-btn" data-bg-type="video" style="background:transparent;color:var(--text);border:1px solid var(--border);">Video</button>
                    <button class="save-btn bg-type-btn" data-bg-type="none" style="background:transparent;color:var(--text);border:1px solid var(--border);">None</button>
                </div>
            </div>
            <div class="settings-row" id="bg-image-row">
                <label>Background Image</label>
                <div class="bg-upload-row">
                    <input type="file" id="bg-upload-input" accept="image/*" style="display:none" />
                    <button class="save-btn" id="bg-upload-btn">Upload Image</button>
                    <button class="save-btn bg-remove-btn" id="bg-remove-btn">Remove</button>
                </div>
            </div>
            <div class="settings-row" id="bg-video-row" style="display:none;">
                <label>Video URL (YouTube or direct MP4)</label>
                <div class="video-input-row">
                    <input type="text" class="settings-input" id="video-url-input" placeholder="YouTube URL or .mp4 link..." />
                    <button class="save-btn" id="video-url-save-btn">Load</button>
                    <button class="save-btn bg-remove-btn" id="video-clear-btn" title="Clear video" style="flex-shrink:0;">Clear</button>
                </div>
            </div>
            <div class="settings-row">
                <label>Background Opacity: <span id="opacity-value">15%</span></label>
                <input type="range" class="opacity-slider" id="opacity-slider" min="5" max="60" value="15" />
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
